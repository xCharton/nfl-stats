name: Update NFL Stats

on:
  schedule:
    - cron: "0 6 * * 2"
  workflow_dispatch:
    inputs:
      season:
        description: "Season year e.g. 2026 (leave blank for current)"
        required: false
        default: ""

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch scoreboard + standings
        run: python fetch_stats.py current

      - name: Fetch all 32 teams + box scores
        run: python update_all_teams.py ${{ github.event.inputs.season }}

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update NFL stats $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
